# .github/workflows/gsri-schedule.yml
name: GSRI Scheduled Runner

on:
  schedule:
    - cron: '0 * * * *'    # hourly at minute 0 UTC (intraday responsiveness)
    - cron: '0 2 * * *'    # daily at 02:00 UTC (EOD stable snapshot)
  workflow_dispatch: {}    # allow manual runs

jobs:
  run-gsri:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run GSRI snapshot script
        env:
          START_DATE: '2006-01-01'
          END_DATE: '2021-12-31'
        run: |
          python scripts/run_gsri_and_commit.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gsri_snapshot.json
          git commit -m "GSRI snapshot: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push
